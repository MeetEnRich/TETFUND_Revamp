<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login — TETFund</title>
    <link rel="shortcut icon" href="/assets/images/fav.png" type="image/png">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <div class="auth-layout">
        <!-- BRANDING SIDE (Desktop Only) -->
        <div class="auth-brand">
            <img src="/assets/images/white-logo.svg" alt="TETFund Logo" style="filter: brightness(0) invert(1);">
            <h2>TETFund Portal Gateway</h2>
            <p>Access the secure electronic procurement bidding system and national intervention portals for tertiary institutions.</p>
        </div>

        <!-- FORM SIDE -->
        <div class="auth-form-container">
            <div class="auth-form-box">
                <!-- Mobile Logo -->
                <div class="auth-logo-mobile">
                    <div class="logo-crop-wrapper" style="margin: 0 auto 0.75rem;">
                        <img src="/assets/tetfund.jpg" alt="TETFund Logo">
                    </div>
                    <p>Tertiary Education Trust Fund</p>
                </div>

                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                    <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
                </div>

                <!-- LOGIN FORM -->
                <form id="login-form" class="auth-form fade-in" onsubmit="handleLogin(event)">
                    <h3 class="mb-6 text-center">Welcome Back</h3>
                    
                    <div class="form-group">
                        <label for="login-email" class="form-label">Email Address</label>
                        <input type="email" id="login-email" class="form-input" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group mb-6">
                        <label for="login-password" class="form-label">Password</label>
                        <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                    
                    <div class="mt-4 text-center">
                        <a href="/index.html" class="text-sm text-gray-500 hover:underline">&larr; Back to Main Site</a>
                    </div>
                </form>

                <!-- REGISTER FORM -->
                <form id="register-form" class="auth-form fade-in hidden" onsubmit="handleRegister(event)">
                    <h3 class="mb-6 text-center">Create Portal Account</h3>

                    <div class="form-group">
                        <label for="reg-fullname" class="form-label">Company / Beneficiary Name</label>
                        <input type="text" id="reg-fullname" class="form-input" placeholder="e.g. Acme Construction Ltd" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-email" class="form-label">Email Address</label>
                        <input type="email" id="reg-email" class="form-input" placeholder="contractor@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-password" class="form-label">Password</label>
                        <input type="password" id="reg-password" class="form-input" placeholder="Minimum 6 characters" minlength="6" required>
                    </div>

                    <div class="form-group mb-6">
                        <label for="reg-role" class="form-label">Portal Account Type</label>
                        <select id="reg-role" class="form-select" required>
                            <option value="Contractor" selected>Contractor (E-Bidder)</option>
                            <option value="Beneficiary">Beneficiary Institution</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Register Account</button>
                    
                    <div class="mt-4 text-center">
                        <a href="/index.html" class="text-sm text-gray-500 hover:underline">&larr; Back to Main Site</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Tab switching logic
        function switchTab(tab) {
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');

            if (tab === 'login') {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                tabLogin.classList.remove('active');
                tabRegister.classList.add('active');
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
